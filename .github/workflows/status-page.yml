name: Status Page

on:
  push:
    branches:
      - main
  issues:
    types:
      - opened
      - edited
      - labeled
      - unlabeled
      - closed
      - reopened
  issue_comment:
    types:
      - created
      - edited
      - deleted
  workflow_dispatch:

permissions:
  contents: read
  issues: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Test
        run: npm test

      - name: Build status page
        env:
          GH_TOKEN: ${{ github.token }}
        run: npm run build

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site

      - name: Deploy Pages
        id: deployment
        uses: actions/deploy-pages@v4
